    text: >-
      Oil painting, muted earth tones and soft painterly brushwork;
      dusk/twilight with cool diffused light and a faint warm rim accent on
      highlights. Single scene composed to read clearly inside a circular crop:
      a diagonal forest river running from lower-left to upper-right, a freshly
      fallen stag at the near bank (lower-left) bleeding dark red into the
      water, a solitary man standing at the right bank with bowed head and calm,
      resigned posture, and a translucent, submerged reflection of a woman
      visible under the water surface between them. Bare early‑spring trees and
      scattered autumn leaves drifting on the current, low swirling cloud
      formation overhead like circling birds; distant hills with a hint of
      approaching winter snow. Keep figures and key details bold and centered
      for legibility; painterly texture, soft edges, moody melancholic
      atmosphere, no borders.
