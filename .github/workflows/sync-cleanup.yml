name: Post-Sync Cleanup

# Flips illustration URLs in D1 to static paths and trashes the R2 originals,
# but only for images the production site already serves (verified via HTTP).
# Safe to run at any time; images not yet merged/deployed are skipped and
# picked up by a later run. Trigger manually after a deploy to flip fresh
# images immediately.
on:
  workflow_run:
    workflows: ["Database & Assets Sync"]
    types:
      - completed
  workflow_dispatch:

jobs:
  cleanup:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Execute Cleanup and Update DB
        env:
          CF_ACCOUNT_ID: ${{ vars.CF_ACCOUNT_ID }}
          CF_DATABASE_ID: ${{ vars.CF_DATABASE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
        run: pnpm exec tsx scripts/post-sync-cleanup.ts
