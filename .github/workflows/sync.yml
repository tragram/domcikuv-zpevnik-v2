name: Database & Assets Sync

on:
  schedule:
    # Runs automatically at 04:00 UTC every day
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Sync Script
        env:
          CF_ACCOUNT_ID: ${{ vars.CF_ACCOUNT_ID }}
          CF_DATABASE_ID: ${{ vars.CF_DATABASE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
        run: pnpm exec tsx scripts/sync.ts

      - name: Generate Thumbnails
        run: node scripts/generate-thumbnails.mjs

      # Recreates the data-sync branch from current main on every run, so the
      # PR is always a clean songs/-only diff that never diverges from main.
      - name: Create or Update Sync PR
        uses: peter-evans/create-pull-request@v7
        with:
          branch: data-sync
          add-paths: songs/
          commit-message: "chore: automated database and assets sync"
          title: "chore: daily production data sync"
          body: |
            Automated sync of the production D1 database into `songs/`
            (chordpro files, illustration metadata, full images and thumbnails).

            Merging this PR only updates the repository snapshot; production is
            unaffected until the next deploy. After merging and deploying, the
            nightly cleanup flips illustration URLs in D1 to the static paths
            and moves the R2 originals to trash.
          delete-branch: true
